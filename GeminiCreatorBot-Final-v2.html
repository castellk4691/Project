<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Creator Studio | Aesthetic Generator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent-primary: #8b5cf6;
            --accent-secondary: #ec4899;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.2rem; margin: 0; background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent-secondary); }
        input, textarea { width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; color: white; font-size: 1rem; box-sizing: border-box; }

        button { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary)); border: none; border-radius: 12px; color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        button:hover { transform: scale(1.01); filter: brightness(1.1); }

        #results { display: none; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .mood-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .mood-card { background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 16px; position: relative;}
        
        .palette-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; display: block; }
        .palette { display: flex; gap: 6px; margin-bottom: 15px; }
        .swatch { height: 40px; flex-grow: 1; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: transform 0.2s; position: relative; }
        .swatch:hover { transform: scale(1.1); z-index: 10; }
        
        /* New Copy Box Layout */
        .copy-section { margin-bottom: 25px; }
        .copy-box { background: rgba(0, 0, 0, 0.3); padding: 18px; border-radius: 12px 12px 0 0; font-size: 0.95rem; line-height: 1.4; white-space: pre-wrap; border-left: 4px solid var(--accent-primary); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .copy-btn-under { width: 100%; background: rgba(255, 255, 255, 0.05); border: none; border-radius: 0 0 12px 12px; color: var(--text-dim); font-size: 0.75rem; font-weight: 600; padding: 10px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.05em; transition: 0.2s; }
        .copy-btn-under:hover { background: rgba(255, 255, 255, 0.1); color: white; }

        .trend-badge { background: var(--accent-secondary); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; margin-bottom: 10px; display: inline-block;}

        .secondary-btn { background: transparent; border: 1px solid var(--text-dim); margin-top: 10px; }
        
        @media (max-width: 650px) { .mood-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <header>
            <h1>Cover Creator Studio</h1>
            <p style="color: var(--text-dim);">Generate a unique aesthetic for your next TikTok cover.</p>
        </header>

        <div class="input-group">
            <label>Song & Artist</label>
            <input type="text" id="song-info" placeholder="e.g. 'Kill Bill' by SZA">
        </div>

        <div class="input-group">
            <label>The Vibe</label>
            <textarea id="vibe-info" rows="2" placeholder="e.g. slowed + reverb, retro film, or high energy indie"></textarea>
        </div>

        <button onclick="generatePackage()">Generate My Vibe</button>
    </div>

    <div id="results">
        <div class="mood-grid">
            <div class="mood-card">
                <label>Primary Aesthetic</label>
                <span class="palette-label">Palette (Click color to copy hex)</span>
                <div class="palette" id="pal-1"></div>
                <p id="vis-1" style="font-size: 0.85rem; color: var(--text-dim);"></p>
            </div>
            <div class="mood-card">
                <label>TikTok Trend Matcher</label>
                <div class="trend-badge">Suggested Layout</div>
                <p id="trend-matcher" style="font-size: 0.9rem; font-weight: 500; margin: 0;"></p>
                <p id="trend-desc" style="font-size: 0.8rem; color: var(--text-dim); margin-top: 5px;"></p>
            </div>
        </div>

        <div class="mood-card" style="margin-top: 0; margin-bottom: 25px;">
            <label>Typography Suggestion</label>
            <p id="font-suggestion" style="color: var(--accent-primary); font-weight: bold; margin: 5px 0 0 0;"></p>
        </div>

        <!-- CAPTION SECTION -->
        <div class="copy-section">
            <label>Tailored Caption</label>
            <div class="copy-box" id="caption-out"></div>
            <button class="copy-btn-under" onclick="copyText('caption-out', this)">Copy Caption</button>
        </div>
        
        <!-- HASHTAG SECTION -->
        <div class="copy-section">
            <label>Smart Hashtags</label>
            <div class="copy-box" id="hashtag-out" style="color: #a78bfa; font-family: monospace;"></div>
            <button class="copy-btn-under" onclick="copyText('hashtag-out', this)">Copy Hashtags</button>
        </div>

        <button class="secondary-btn" onclick="resetApp()">Start Over</button>
    </div>
</div>

<script>
    const colorLibrary = {
        emotional: ['#2D3250', '#7077A1', '#F6B17A', '#F1E4C3', '#435585', '#818FB4', '#363062', '#F99417', '#E8C872', '#FFF3CF'],
        dark: ['#000000', '#1A1A1B', '#3D0000', '#820000', '#2C3333', '#2E4F4F', '#040D12', '#183D3D', '#5C8374', '#610C9F'],
        upbeat: ['#FF0075', '#17BEBB', '#D62246', '#4B1D3F', '#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F1C', '#2EC4B6', '#E71D36'],
        neutral: ['#F8F9F9', '#BDC3C7', '#A6ACAF', '#7F8C8D', '#2E4053', '#283747', '#212F3D', '#1B2631']
    };

    const visualLibrary = [
        "Warm candlelight, close-up lens, shallow depth of field.",
        "Grainy film texture, blue hour natural lighting.",
        "Minimalist white room, harsh editorial shadows.",
        "Dreamy haze, neon backlighting, soft focus transitions.",
        "Nature-inspired, morning sunlight, handheld camera."
    ];

    const trendMatcher = {
        emotional: {
            title: "The 'Photo Slide' Loop",
            desc: "Post 4 blurry photos of your space. Place lyrics in a 'handwritten' font in the center. Loop the bridge."
        },
        dark: {
            title: "The 'Silhouette' Performance",
            desc: "Film yourself against a bright window or single colored backlight for a silhouette. Add grain."
        },
        upbeat: {
            title: "The 'Fast-Cut' Process",
            desc: "Sync quick cuts of you hitting record, your screen, and you singing. Use high-energy lighting."
        },
        neutral: {
            title: "The 'Static Lyric' Frame",
            desc: "One continuous shot of an object that fits the song with the lyrics typing out slowly."
        }
    };

    function getRandomColors(type, count) {
        let pool = colorLibrary[type] || colorLibrary.neutral;
        return [...pool].sort(() => 0.5 - Math.random()).slice(0, count);
    }

    function copyText(elementId, btn) {
        const text = document.getElementById(elementId).innerText;
        navigator.clipboard.writeText(text).then(() => {
            const originalText = btn.innerText;
            btn.innerText = "Copied to Clipboard!";
            btn.style.color = "var(--success)";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.color = "";
            }, 2000);
        });
    }

    function generatePackage() {
        const input = document.getElementById('song-info').value;
        const vibeInput = document.getElementById('vibe-info').value.toLowerCase();
        if (!input || !vibeInput) return alert("Enter details first!");

        let type = 'neutral';
        if (vibeInput.match(/(sad|emo|soft|lo-fi|chill|slow|emotional)/)) type = 'emotional';
        if (vibeInput.match(/(dark|moody|grunge|metal|shadow|night)/)) type = 'dark';
        if (vibeInput.match(/(upbeat|fun|pop|fast|happy|energy)/)) type = 'upbeat';

        const songTitle = input.split(/by/i)[0].trim();
        const artistName = input.toLowerCase().includes('by') ? input.split(/by/i)[1].trim() : "";

        // Palette
        const pal = document.getElementById('pal-1');
        pal.innerHTML = '';
        getRandomColors(type, 5).forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'swatch';
            swatch.style.background = color;
            swatch.title = `Click to copy ${color}`;
            swatch.onclick = () => {
                navigator.clipboard.writeText(color);
                alert(`Hex code ${color} copied!`);
            };
            pal.appendChild(swatch);
        });

        // Dynamic Text
        document.getElementById('trend-matcher').innerText = trendMatcher[type].title;
        document.getElementById('trend-desc').innerText = trendMatcher[type].desc;
        document.getElementById('vis-1').innerText = visualLibrary[Math.floor(Math.random() * visualLibrary.length)];
        
        const fonts = ["Handwritten & Raw", "Bold Editorial Serif", "Minimalist Sans", "Vintage Typewriter"];
        document.getElementById('font-suggestion').innerText = fonts[Math.floor(Math.random() * fonts.length)];

        document.getElementById('caption-out').innerText = `POV: You're listening to a ${vibeInput} version of ${songTitle}.`;
        const tags = `#${songTitle.replace(/\s+/g, '')} #${artistName.replace(/\s+/g, '') || 'Singer'}Cover #${vibeInput.split(' ')[0]}Music #CoverArtist`;
        document.getElementById('hashtag-out').innerText = tags;

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('results').style.display = 'block';
    }

    function resetApp() {
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('results').style.display = 'none';
    }
</script>
</body>
</html>
